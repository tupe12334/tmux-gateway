syntax = "proto3";

package tmux_gateway;

service TmuxGateway {
  rpc Ls(LsRequest) returns (LsResponse);
}

message LsRequest {}

message LsResponse {
  repeated TmuxSession sessions = 1;
}

message TmuxSession {
  string name = 1;
  uint32 windows = 2;
  string created = 3;
  bool attached = 4;
}