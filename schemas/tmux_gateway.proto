syntax = "proto3";

package tmux_gateway;

service TmuxGateway {
  rpc Ls(LsRequest) returns (LsResponse);
  rpc NewSession(NewSessionRequest) returns (NewSessionResponse);
}

message LsRequest {}

message LsResponse {
  repeated TmuxSession sessions = 1;
}

message TmuxSession {
  string name = 1;
  uint32 windows = 2;
  string created = 3;
  bool attached = 4;
}

message NewSessionRequest {
  string name = 1;
}

message NewSessionResponse {
  string name = 1;
}