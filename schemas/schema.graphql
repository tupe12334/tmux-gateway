type MutationRoot {
	createSession(name: String!): String!
	killSession(target: String!): Boolean!
	killWindow(target: String!): Boolean!
	killPane(target: String!): Boolean!
	sendKeys(target: String!, keys: [String!]!): Boolean!
	renameSession(target: String!, newName: String!): Boolean!
	renameWindow(target: String!, newName: String!): Boolean!
	newWindow(session: String!, name: String!): String!
	splitWindow(target: String!, horizontal: Boolean!): Boolean!
}

type Pane {
	id: String!
	width: Int!
	height: Int!
	active: Boolean!
}

type QueryRoot {
	health: String!
	ls: [Session!]!
	listWindows(session: String!): [Window!]!
	listPanes(target: String!): [Pane!]!
	capturePane(target: String!): String!
}

type Session {
	name: String!
	windows: Int!
	created: String!
	attached: Boolean!
}

type Window {
	index: Int!
	name: String!
	panes: Int!
	active: Boolean!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: QueryRoot
	mutation: MutationRoot
}
