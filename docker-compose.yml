services:
  tmux-gateway:
    build: .
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
      - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"
    env_file:
      - .env.dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HTTP_PORT:-8080}/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  grpcui:
    image: fullstorydev/grpcui:latest
    ports:
      - "9090:9090"
    command: ["-plaintext", "-port", "9090", "-bind", "0.0.0.0", "tmux-gateway:${GRPC_PORT:-50051}"]
    depends_on:
      tmux-gateway:
        condition: service_healthy
